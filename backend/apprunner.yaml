version: 1.0
runtime: nodejs18

build:
  commands:
    build:
      - npm install
run:
  command: node server.js
  network:
    port: 5000
    env: PUBLIC
  env:
    - name: NODE_ENV
      value: production
    - name: AI_SERVICE_URL
      value: "https://omniscan-ai-python.onrender.com" # Update this to your deployed AI Python Service URL later if needed!
